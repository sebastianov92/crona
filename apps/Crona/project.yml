name: Crona
options:
  bundleIdPrefix: com.sebastian
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
schemes:
  Crona:
    build:
      targets:
        Crona: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Crona:
    type: application
    supportedDestinations: [iOS, macOS]
    sources: [Sources]
    dependencies:
      - target: CronaWidget
        embed: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Crona
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSAppTransportSecurity:            # servidor puede ser http:// (SPEC §2)
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastianov.crona
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 938LM5GW29   # Personal Team — fijo aquí para que xcodegen no lo pierda
        # base = iOS (formato "group.…" que exige el portal); macOS lo sobreescribe con el suyo
        CODE_SIGN_ENTITLEMENTS: Sources/iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/macOS.entitlements
        # DEVELOPMENT_TEAM se elige en Xcode → Signing (Personal Team).
        # App Groups es de las capabilities permitidas con Personal Team (necesaria para el widget).

  CronaWidget:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources: [WidgetSources]
    info:
      path: WidgetSources/Info.plist
      properties:
        CFBundleDisplayName: Crona
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sebastianov.crona.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 938LM5GW29
        SKIP_INSTALL: true
        CODE_SIGN_ENTITLEMENTS: WidgetSources/iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": WidgetSources/macOS.entitlements

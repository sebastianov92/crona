name: Release apps (DMG + IPA)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build DMG + IPA
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [[ "$TAG" == v* ]] && export VERSION="${TAG#v}"
          ./scripts/build-release.sh
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Crona.dmg
            dist/Crona.ipa
          generate_release_notes: true
        if: startsWith(github.ref, 'refs/tags/')
      - name: Upload artifacts (manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: crona-apps
          path: dist/
        if: "!startsWith(github.ref, 'refs/tags/')"
      - name: Update SideStore source.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SIZE=$(stat -f%z dist/Crona.ipa)
          TAG="${GITHUB_REF#refs/tags/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main && git checkout main
          ./scripts/make-source.sh "$TAG" "$SIZE" "Actualización $TAG"
          git add source.json
          git commit -m "chore: source.json → $TAG" || exit 0
          git push origin main
